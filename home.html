<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>CBT77 主選單</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@600;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: #1a1a2e;
  color: white;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  user-select: none;
}

/* Header */
header {
  padding: 16px 24px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.store-name {
  font-size: 1.3rem;
  font-weight: 900;
  letter-spacing: .02em;
  color: white;
}
.store-name span { color: #f59e0b; }
.header-right {
  text-align: right;
}
#home-clock {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.4rem;
  font-weight: 700;
  color: white;
}
#home-date {
  font-size: .75rem;
  color: rgba(255,255,255,.5);
  margin-top: 2px;
}

/* Today summary bar */
#today-bar {
  margin: 0 16px 14px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 12px;
  padding: 12px 20px;
  display: flex;
  gap: 0;
  flex-shrink: 0;
}
.today-item {
  flex: 1;
  text-align: center;
  border-right: 1px solid rgba(255,255,255,.1);
}
.today-item:last-child { border-right: none; }
.today-label { font-size: .7rem; color: rgba(255,255,255,.5); margin-bottom: 4px; }
.today-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.1rem;
  font-weight: 700;
  color: #f59e0b;
}
.today-val.green { color: #34d399; }
.today-val.blue { color: #60a5fa; }

/* Grid */
#grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 12px;
  padding: 0 16px 16px;
  overflow: hidden;
}

.tile {
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  cursor: pointer;
  transition: transform .15s, opacity .15s;
  position: relative;
  overflow: hidden;
  padding: 16px;
}
.tile:active { transform: scale(.95); opacity: .88; }
.tile-icon { font-size: 2.4rem; line-height: 1; }
.tile-label {
  font-size: .88rem;
  font-weight: 700;
  text-align: center;
  line-height: 1.3;
  color: white;
}
.tile-sub {
  font-size: .7rem;
  color: rgba(255,255,255,.65);
  text-align: center;
}

/* Tile colors */
.tile-pos {
  background: linear-gradient(135deg, #f59e0b, #d97706);
  grid-column: span 1;
  grid-row: span 2;
}
.tile-pos .tile-icon { font-size: 3rem; }
.tile-pos .tile-label { font-size: 1rem; }

.tile-daily { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
.tile-void  { background: linear-gradient(135deg, #dc2626, #b91c1c); }
.tile-txn   { background: linear-gradient(135deg, #059669, #047857); }
.tile-prod  { background: linear-gradient(135deg, #7c3aed, #6d28d9); }
.tile-refund{ background: linear-gradient(135deg, #ea580c, #c2410c); }
.tile-period{ background: linear-gradient(135deg, #0f766e, #115e59); }

/* Badge */
.tile-badge {
  position: absolute;
  top: 10px; right: 10px;
  background: rgba(255,255,255,.25);
  border-radius: 8px;
  padding: 2px 8px;
  font-size: .68rem;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
}

/* Modal overlay */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  display: none; align-items: center; justify-content: center;
  z-index: 100; padding: 16px;
  backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }
.modal {
  background: #1e2230;
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 16px;
  padding: 24px;
  width: 100%; max-width: 500px;
  max-height: 85dvh;
  display: flex; flex-direction: column; gap: 14px;
  animation: mIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes mIn { from{opacity:0;transform:scale(.93)} to{opacity:1;transform:scale(1)} }
.modal-title {
  font-size: 1.1rem; font-weight: 800;
  display: flex; align-items: center; gap: 8px;
}
.modal-close {
  margin-left: auto;
  background: rgba(255,255,255,.1);
  border: none; border-radius: 8px;
  color: white; padding: 6px 12px;
  cursor: pointer; font-size: .85rem;
}
.modal-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
.modal-body::-webkit-scrollbar { width: 3px; }
.modal-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 3px; }

/* Stats table */
.stats-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px;
  background: rgba(255,255,255,.05);
  border-radius: 8px;
  font-size: .9rem;
}
.stats-row .sk { color: rgba(255,255,255,.65); }
.stats-row .sv {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700; color: #f59e0b;
}
.stats-row.header {
  background: rgba(255,255,255,.1);
  font-size: .78rem; font-weight: 700;
  color: rgba(255,255,255,.5);
}
.stats-row.header .sv { color: rgba(255,255,255,.5); }

/* Transaction list */
.txn-item {
  background: rgba(255,255,255,.05);
  border-radius: 8px; padding: 10px 14px;
  display: flex; flex-direction: column; gap: 4px;
}
.txn-top { display: flex; justify-content: space-between; align-items: center; }
.txn-id { font-family: 'JetBrains Mono', monospace; font-size: .8rem; color: rgba(255,255,255,.5); }
.txn-amt { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1rem; color: #34d399; }
.txn-amt.voided { color: #f87171; text-decoration: line-through; }
.txn-bot { display: flex; justify-content: space-between; font-size: .78rem; color: rgba(255,255,255,.5); }
.txn-void-btn {
  background: rgba(220,38,38,.2);
  border: 1px solid rgba(220,38,38,.4);
  border-radius: 6px; padding: 3px 10px;
  color: #f87171; font-size: .75rem; cursor: pointer;
  transition: background .15s;
}
.txn-void-btn:hover { background: rgba(220,38,38,.4); }
.txn-void-btn:disabled { opacity: .4; cursor: not-allowed; }
.pay-detail {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 8px;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.pay-detail-title { font-weight: 800; color: #f59e0b; font-size: .85rem; }
.pay-line { display: flex; justify-content: space-between; font-size: .78rem; color: rgba(255,255,255,.65); gap: 12px; }
.pay-line strong { font-family: 'JetBrains Mono', monospace; color: #34d399; white-space: nowrap; }
.period-tools {
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 10px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.period-presets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.period-btn {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 8px;
  color: rgba(255,255,255,.8);
  padding: 8px 6px;
  font-size: .78rem;
  font-weight: 700;
  cursor: pointer;
}
.period-btn:active { transform: scale(.97); }
.period-dates { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.period-field { display: flex; flex-direction: column; gap: 5px; }
.period-field label { font-size: .72rem; color: rgba(255,255,255,.5); }
.period-field input {
  background: rgba(0,0,0,.22);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 8px;
  color: white;
  padding: 8px 10px;
  font-family: 'JetBrains Mono', monospace;
}
.period-search {
  background: #f59e0b;
  border: none;
  border-radius: 8px;
  color: #111827;
  font-weight: 900;
  padding: 10px;
  cursor: pointer;
}
.day-detail {
  background: rgba(255,255,255,.035);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 8px;
  padding: 9px 10px;
}
.day-title { display:flex; justify-content:space-between; font-weight:800; color:#f59e0b; font-size:.82rem; margin-bottom:6px; }
.day-grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:5px; font-size:.72rem; color:rgba(255,255,255,.62); }
.day-grid strong { display:block; font-family:'JetBrains Mono', monospace; color:#34d399; font-size:.78rem; margin-top:2px; }

/* Loading spinner in modal */
.modal-spinner {
  display: flex; align-items: center; justify-content: center;
  padding: 40px; color: rgba(255,255,255,.4);
  flex-direction: column; gap: 12px;
}
.mini-spinner {
  width: 32px; height: 32px;
  border: 2px solid rgba(255,255,255,.15);
  border-top-color: #f59e0b;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
#toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1e2230; color: white;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 8px; padding: 9px 18px; font-size: .85rem;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  z-index: 9999; white-space: nowrap; pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.ok { border-color: #34d399; color: #34d399; }
#toast.err { border-color: #f87171; color: #f87171; }
</style>
</head>
<body>

<header>
  <div>
    <div class="store-name">草本堂<span>中藥房</span></div>
    <div style="font-size:.72rem;color:rgba(255,255,255,.4);margin-top:2px">收銀管理系統</div>
  </div>
  <div class="header-right">
    <div id="home-clock"></div>
    <div id="home-date"></div>
  </div>
</header>

<div id="today-bar">
  <div class="today-item">
    <div class="today-label">今日營業額</div>
    <div class="today-val" id="bar-revenue">載入中</div>
  </div>
  <div class="today-item">
    <div class="today-label">今日訂單數</div>
    <div class="today-val green" id="bar-orders">—</div>
  </div>
  <div class="today-item">
    <div class="today-label">今日件數</div>
    <div class="today-val blue" id="bar-items">—</div>
  </div>
</div>

<div id="grid">
  <!-- POS -->
  <div class="tile tile-pos" onclick="gotoPOS()">
    <div class="tile-icon">🏪</div>
    <div class="tile-label">開始收銀</div>
    <div class="tile-sub">POS 結帳系統</div>
  </div>

  <!-- 日銷統計 -->
  <div class="tile tile-daily" onclick="openDaily()">
    <div class="tile-icon">📊</div>
    <div class="tile-label">日銷統計</div>
    <div class="tile-sub">今日營收報表</div>
  </div>

  <!-- 銷售作廢 -->
  <div class="tile tile-void" onclick="openVoid()">
    <div class="tile-icon">🗑️</div>
    <div class="tile-label">銷售作廢</div>
    <div class="tile-sub">取消訂單</div>
  </div>

  <!-- 交易明細 -->
  <div class="tile tile-txn" onclick="openTxn()">
    <div class="tile-icon">📋</div>
    <div class="tile-label">交易明細</div>
    <div class="tile-sub">今日所有交易</div>
  </div>

  <!-- 日商品統計 -->
  <div class="tile tile-prod" onclick="openProd()">
    <div class="tile-icon">📦</div>
    <div class="tile-label">日商品統計</div>
    <div class="tile-sub">商品銷售排行</div>
  </div>

  <!-- 退貨處理 -->
  <div class="tile tile-refund" onclick="openRefund()">
    <div class="tile-icon">↩️</div>
    <div class="tile-label">退貨處理</div>
    <div class="tile-sub">保留銷售紀錄</div>
  </div>

  <!-- 期間報表 -->
  <div class="tile tile-period" onclick="openPeriod()">
    <div class="tile-icon">🗓️</div>
    <div class="tile-label">期間報表</div>
    <div class="tile-sub">最多查 3 個月</div>
  </div>
</div>

<!-- Daily Stats Modal -->
<div class="modal-overlay" id="daily-modal">
  <div class="modal">
    <div class="modal-title">📊 日銷統計<button class="modal-close" onclick="closeModal('daily-modal')">關閉</button></div>
    <div class="modal-body" id="daily-body"><div class="modal-spinner"><div class="mini-spinner"></div><div>載入中…</div></div></div>
  </div>
</div>

<!-- Void Modal -->
<div class="modal-overlay" id="void-modal">
  <div class="modal">
    <div class="modal-title">🗑️ 銷售作廢<button class="modal-close" onclick="closeModal('void-modal')">關閉</button></div>
    <div class="modal-body" id="void-body"><div class="modal-spinner"><div class="mini-spinner"></div><div>載入中…</div></div></div>
  </div>
</div>

<!-- Transaction Modal -->
<div class="modal-overlay" id="txn-modal">
  <div class="modal">
    <div class="modal-title">📋 交易明細<button class="modal-close" onclick="closeModal('txn-modal')">關閉</button></div>
    <div class="modal-body" id="txn-body"><div class="modal-spinner"><div class="mini-spinner"></div><div>載入中…</div></div></div>
  </div>
</div>

<!-- Refund Modal -->
<div class="modal-overlay" id="refund-modal">
  <div class="modal">
    <div class="modal-title">↩️ 退貨處理<button class="modal-close" onclick="closeModal('refund-modal')">關閉</button></div>
    <div class="modal-body" id="refund-body"><div class="modal-spinner"><div class="mini-spinner"></div><div>載入中…</div></div></div>
  </div>
</div>

<!-- Product Stats Modal -->
<div class="modal-overlay" id="prod-modal">
  <div class="modal">
    <div class="modal-title">📦 日商品統計<button class="modal-close" onclick="closeModal('prod-modal')">關閉</button></div>
    <div class="modal-body" id="prod-body"><div class="modal-spinner"><div class="mini-spinner"></div><div>載入中…</div></div></div>
  </div>
</div>

<!-- Period Report Modal -->
<div class="modal-overlay" id="period-modal">
  <div class="modal">
    <div class="modal-title">🗓️ 期間收款報表<button class="modal-close" onclick="closeModal('period-modal')">關閉</button></div>
    <div class="modal-body" id="period-body"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const STORE_URL = 'https://cbt77.tw';
const SAVED_KEY='ck_e0e254b239925f0be628a03730eec1e7c61fa6e0';
const SAVED_SECRET='cs_3956bc73786c2d0827c5ce91e23b55fd985f2bf3';
let _savedCfg = null;

function getCfg() {
  if (_savedCfg) return _savedCfg;
  _savedCfg = {key:SAVED_KEY,secret:SAVED_SECRET};
  return _savedCfg;
}
function wcAuth() {
  const c = getCfg();
  return 'Basic ' + btoa(`${c.key||''}:${c.secret||''}`);
}
async function wcGet(path) {
  return fetch(`${STORE_URL}/wp-json/wc/v3/${path}`, { headers: { Authorization: wcAuth() } });
}

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('home-clock').textContent =
    now.toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('home-date').textContent =
    now.toLocaleDateString('zh-TW', {year:'numeric',month:'long',day:'numeric',weekday:'short'});
}
setInterval(updateClock, 1000); updateClock();

// Today bar
async function loadTodayStats() {
  try {
    const orders = await getTodayOrders('completed,processing');
    const totals = summarizeOrders(orders);
    document.getElementById('bar-revenue').textContent = `$${totals.total.toLocaleString()}`;
    document.getElementById('bar-orders').textContent = orders.length || 0;
    document.getElementById('bar-items').textContent = totals.items || 0;
  } catch(e) {
    document.getElementById('bar-revenue').textContent = '—';
  }
}
loadTodayStats();

// Navigation
function gotoPOS() {
  window.location.href = 'https://vinliu20000-star.github.io/pos/';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('show');
}

// Today orders helper
function todayKey() {
  const today = new Date();
  const y = today.getFullYear();
  const m = String(today.getMonth()+1).padStart(2,'0');
  const d = String(today.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function dateKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function addDays(dateStr, days) {
  const d = new Date(`${dateStr}T12:00:00`);
  d.setDate(d.getDate()+days);
  return dateKey(d);
}
function addMonths(date, months) {
  const d = new Date(date);
  d.setMonth(d.getMonth()+months);
  return d;
}
function monthRange(offset=0) {
  const now = new Date();
  const first = new Date(now.getFullYear(), now.getMonth()+offset, 1);
  const last = new Date(now.getFullYear(), now.getMonth()+offset+1, 0);
  return { start: dateKey(first), end: dateKey(last > now ? now : last) };
}
async function getTodayOrders(status='completed,processing') {
  const dateStr = todayKey();
  const r = await wcGet(`orders?after=${dateStr}T00:00:00&before=${dateStr}T23:59:59&per_page=100&status=${status}`);
  if (!r.ok) return [];
  return await r.json();
}
async function getRangeOrders(start, end, status='completed,processing') {
  let page = 1, all = [];
  while (page <= 10) {
    const path = `orders?after=${start}T00:00:00&before=${end}T23:59:59&per_page=100&page=${page}&status=${status}`;
    const r = await wcGet(path);
    if (!r.ok) break;
    const data = await r.json();
    all = all.concat(data);
    if (data.length < 100) break;
    page++;
  }
  return all;
}
const PAYMENT_LABELS = { cash:'現金', line_pay:'Line Pay', taiwan_pay:'台灣 Pay' };
function orderPayKey(o) {
  const meta = o.meta_data || [];
  const saved = meta.find(m => m.key === '_pos_payment_method')?.value;
  return saved || o.payment_method || 'unknown';
}
function orderPayLabel(o) {
  const key = orderPayKey(o);
  return PAYMENT_LABELS[key] || o.payment_method_title || key || '未記錄';
}
function summarizeOrders(orders) {
  const init = () => ({ total:0, count:0, orders:[] });
  const by = { cash:init(), line_pay:init(), taiwan_pay:init(), other:init() };
  let total = 0, items = 0;
  orders.forEach(o => {
    const amount = Number(o.total || 0);
    const key = by[orderPayKey(o)] ? orderPayKey(o) : 'other';
    total += amount;
    items += (o.line_items||[]).reduce((s,i)=>s+Number(i.quantity||0),0);
    by[key].total += amount;
    by[key].count += 1;
    by[key].orders.push(o);
  });
  return { total, items, by };
}
function paymentDetailHtml(title, group) {
  const rows = group.orders.length
    ? group.orders.map(o => `<div class="pay-line"><span>#${o.id} · ${new Date(o.date_created).toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</span><strong>$${Number(o.total).toLocaleString()}</strong></div>`).join('')
    : '<div class="pay-line"><span>沒有此付款方式</span><strong>$0</strong></div>';
  return `<div class="pay-detail"><div class="pay-detail-title">${title}｜${group.count} 筆｜$${group.total.toLocaleString()}</div>${rows}</div>`;
}
function groupOrdersByDay(orders) {
  const days = {};
  orders.forEach(o => {
    const key = (o.date_created || '').slice(0,10) || todayKey();
    if (!days[key]) days[key] = [];
    days[key].push(o);
  });
  return Object.entries(days).sort((a,b)=>b[0].localeCompare(a[0]));
}

// Daily Stats
async function openDaily() {
  document.getElementById('daily-modal').classList.add('show');
  const body = document.getElementById('daily-body');
  body.innerHTML = '<div class="modal-spinner"><div class="mini-spinner"></div><div>載入中…</div></div>';
  try {
    const today = todayKey();
    const orders = await getTodayOrders('completed,processing');
    const summary = summarizeOrders(orders);
    const totalSales = summary.total;
    const totalOrders = orders.length;
    const totalItems = summary.items;
    const avgOrder = totalOrders > 0 ? Math.round(totalSales/totalOrders) : 0;

    body.innerHTML = `
      <div class="stats-row"><span class="sk">📅 日期</span><span class="sv">${today}</span></div>
      <div class="stats-row"><span class="sk">💰 總營業額</span><span class="sv">$${totalSales.toLocaleString()}</span></div>
      <div class="stats-row"><span class="sk">🧾 訂單數</span><span class="sv">${totalOrders} 筆</span></div>
      <div class="stats-row"><span class="sk">📦 銷售件數</span><span class="sv">${totalItems} 件</span></div>
      <div class="stats-row"><span class="sk">💵 現金收入</span><span class="sv">$${summary.by.cash.total.toLocaleString()}</span></div>
      <div class="stats-row"><span class="sk">🟢 Line Pay</span><span class="sv">$${summary.by.line_pay.total.toLocaleString()}</span></div>
      <div class="stats-row"><span class="sk">🟠 台灣 Pay</span><span class="sv">$${summary.by.taiwan_pay.total.toLocaleString()}</span></div>
      <div class="stats-row"><span class="sk">📊 平均客單價</span><span class="sv">$${avgOrder.toLocaleString()}</span></div>
      ${paymentDetailHtml('💵 現金每筆', summary.by.cash)}
      ${paymentDetailHtml('🟢 Line Pay 每筆', summary.by.line_pay)}

  } catch(e) {
    body.innerHTML = '<div class="modal-spinner">載入失敗，請確認連線</div>';
  }
}

// Void (cancel orders)
async function openVoid() {
  document.getElementById('void-modal').classList.add('show');
  const body = document.getElementById('void-body');
  body.innerHTML = '<div class="modal-spinner"><div class="mini-spinner"></div><div>載入中…</div></div>';
  try {
    const orders = await getTodayOrders();
    if (!orders.length) { body.innerHTML = '<div class="modal-spinner">今日尚無訂單</div>'; return; }
    body.innerHTML = orders.map(o => `
      <div class="txn-item">
        <div class="txn-top">
          <span class="txn-id">#${o.id} · ${new Date(o.date_created).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})}</span>
          <span class="txn-amt ${o.status==='cancelled'?'voided':''}">$${Number(o.total).toLocaleString()}</span>
        </div>
        <div class="txn-bot">
          <span>${o.billing?.last_name||''}${o.billing?.first_name||''} · ${orderPayLabel(o)} · ${o.line_items?.length||0} 項商品</span>
          ${o.status!=='cancelled'
            ? `<button class="txn-void-btn" onclick="voidOrder(${o.id},this)">作廢</button>`
            : `<span style="color:#f87171;font-size:.75rem">已作廢</span>`}
        </div>
      </div>`).join('');
  } catch(e) {
    body.innerHTML = '<div class="modal-spinner">載入失敗</div>';
  }
}

async function voidOrder(orderId, btn) {
  if (!confirm(`確定要作廢訂單 #${orderId}？此動作無法復原。`)) return;
  btn.disabled = true; btn.textContent = '處理中…';
  try {
    const r = await fetch(`${STORE_URL}/wp-json/wc/v3/orders/${orderId}`, {
      method: 'PUT',
      headers: { Authorization: wcAuth(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'cancelled' })
    });
    if (r.ok) {
      btn.closest('.txn-item').querySelector('.txn-amt').classList.add('voided');
      btn.replaceWith(Object.assign(document.createElement('span'),{
        textContent:'已作廢', style:'color:#f87171;font-size:.75rem'
      }));
      toast('訂單已作廢','ok');
      loadTodayStats();
    } else throw new Error();
  } catch(e) { btn.disabled=false; btn.textContent='作廢'; toast('作廢失敗','err'); }
}

// Refund (real return, keep original sale history)
async function openRefund() {
  document.getElementById('refund-modal').classList.add('show');
  const body = document.getElementById('refund-body');
  body.innerHTML = '<div class="modal-spinner"><div class="mini-spinner"></div><div>載入中…</div></div>';
  try {
    const orders = await getTodayOrders('completed,processing');
    if (!orders.length) { body.innerHTML = '<div class="modal-spinner">今日尚無可退貨訂單</div>'; return; }
    body.innerHTML = `
      <div style="font-size:.8rem;color:rgba(255,255,255,.55);line-height:1.6;background:rgba(255,255,255,.05);padding:10px 12px;border-radius:8px;">
        退貨會保留原本銷售紀錄，另外建立退款紀錄，並把訂單標記為已退款；作廢則適合結錯單立即取消。
      </div>
      ${orders.map(o => {
        const items = (o.line_items||[]).map(i=>`${i.name} ×${i.quantity}`).join('、');
        return `<div class="txn-item">
          <div class="txn-top">
            <span class="txn-id">#${o.id} · ${new Date(o.date_created).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})}</span>
            <span class="txn-amt">$${Number(o.total).toLocaleString()}</span>
          </div>
          <div class="txn-bot">
            <span>${orderPayLabel(o)} · ${o.billing?.last_name||''}${o.billing?.first_name||''}</span>
            <button class="txn-void-btn" onclick="refundOrder(${o.id},${Number(o.total)},this)">退貨</button>
          </div>
          <div style="font-size:.72rem;color:rgba(255,255,255,.4);margin-top:4px">${items}</div>
        </div>`;
      }).join('')}`;
  } catch(e) {
    body.innerHTML = '<div class="modal-spinner">載入失敗</div>';
  }
}

async function refundOrder(orderId, amount, btn) {
  if (!confirm(`確定要退貨訂單 #${orderId}？\\n金額：$${Number(amount).toLocaleString()}\\n此動作會建立退款紀錄並標記為已退款。`)) return;
  btn.disabled = true; btn.textContent = '處理中…';
  try {
    const rr = await fetch(`${STORE_URL}/wp-json/wc/v3/orders/${orderId}/refunds`, {
      method: 'POST',
      headers: { Authorization: wcAuth(), 'Content-Type': 'application/json' },
      body: JSON.stringify({
        amount: String(amount),
        reason: 'POS 退貨處理',
        api_refund: false
      })
    });
    if (!rr.ok) throw new Error();
    await fetch(`${STORE_URL}/wp-json/wc/v3/orders/${orderId}`, {
      method: 'PUT',
      headers: { Authorization: wcAuth(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'refunded' })
    });
    btn.closest('.txn-item').querySelector('.txn-amt').classList.add('voided');
    btn.replaceWith(Object.assign(document.createElement('span'),{
      textContent:'已退貨', style:'color:#fb923c;font-size:.75rem'
    }));
    toast('退貨已完成','ok');
    loadTodayStats();
  } catch(e) {
    btn.disabled=false; btn.textContent='退貨'; toast('退貨失敗，請到 WooCommerce 後台確認','err');
  }
}

// Transaction detail
async function openTxn() {
  document.getElementById('txn-modal').classList.add('show');
  const body = document.getElementById('txn-body');
  body.innerHTML = '<div class="modal-spinner"><div class="mini-spinner"></div><div>載入中…</div></div>';
  try {
    const today = todayKey();
    const r = await wcGet(`orders?after=${today}T00:00:00&before=${today}T23:59:59&per_page=100`);
    const orders = r.ok ? await r.json() : [];
    if (!orders.length) { body.innerHTML = '<div class="modal-spinner">今日尚無交易</div>'; return; }
    body.innerHTML = orders.map(o => {
      const statusMap = {'completed':'✅ 完成','cancelled':'❌ 作廢','processing':'⏳ 處理中','refunded':'↩️ 已退貨'};
      const items = (o.line_items||[]).map(i=>`${i.name} ×${i.quantity}`).join('、');
      return `<div class="txn-item">
        <div class="txn-top">
          <span class="txn-id">#${o.id} · ${new Date(o.date_created).toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})}</span>
          <span class="txn-amt ${o.status==='cancelled'?'voided':''}">$${Number(o.total).toLocaleString()}</span>
        </div>
        <div class="txn-bot">
          <span>${statusMap[o.status]||o.status} · ${orderPayLabel(o)}</span>
          <span>${o.billing?.last_name||''}${o.billing?.first_name||''}</span>
        </div>
        <div style="font-size:.72rem;color:rgba(255,255,255,.4);margin-top:4px">${items}</div>
      </div>`;
    }).join('');
  } catch(e) {
    body.innerHTML = '<div class="modal-spinner">載入失敗</div>';
  }
}

// Product stats
async function openProd() {
  document.getElementById('prod-modal').classList.add('show');
  const body = document.getElementById('prod-body');
  body.innerHTML = '<div class="modal-spinner"><div class="mini-spinner"></div><div>載入中…</div></div>';

  }
}

// Period payment report
function openPeriod() {
  document.getElementById('period-modal').classList.add('show');
  const body = document.getElementById('period-body');
  const r = monthRange(0);
  body.innerHTML = `
    <div class="period-tools">
      <div class="period-presets">
        <button class="period-btn" onclick="setPeriodPreset('today')">今天</button>
        <button class="period-btn" onclick="setPeriodPreset('yesterday')">昨天</button>
        <button class="period-btn" onclick="setPeriodPreset('week')">近 7 天</button>
        <button class="period-btn" onclick="setPeriodPreset('month')">本月</button>
        <button class="period-btn" onclick="setPeriodPreset('lastmonth')">上個月</button>
        <button class="period-btn" onclick="setPeriodPreset('three')">近 3 個月</button>
      </div>
      <div class="period-dates">
        <div class="period-field"><label>開始日期</label><input type="date" id="period-start" value="${r.start}"></div>
        <div class="period-field"><label>結束日期</label><input type="date" id="period-end" value="${r.end}"></div>
      </div>
      <button class="period-search" onclick="runPeriodReport()">查詢收款狀況</button>
      <div style="font-size:.75rem;color:rgba(255,255,255,.45);line-height:1.5;">為了避免查詢太慢，POS 最多查最近 3 個月。已退貨 / 作廢訂單不列入收款總額。</div>
    </div>
    <div id="period-result"><div class="modal-spinner" style="padding:18px;color:rgba(255,255,255,.35)">選好日期後按查詢</div></div>
  `;
  runPeriodReport();
}
function setPeriodPreset(type) {
  const today = todayKey();
  let start = today, end = today;
  if (type === 'yesterday') { start = end = addDays(today, -1); }
  if (type === 'week') start = addDays(today, -6);
  if (type === 'month') { const r = monthRange(0); start = r.start; end = r.end; }
  if (type === 'lastmonth') { const r = monthRange(-1); start = r.start; end = r.end; }
  if (type === 'three') start = dateKey(addMonths(new Date(), -3));
  document.getElementById('period-start').value = start;
  document.getElementById('period-end').value = end;
  runPeriodReport();
}
function validatePeriod(start, end) {
  const today = todayKey();
  const min = dateKey(addMonths(new Date(), -3));
  if (!start || !end) return '請先選擇開始與結束日期';
  if (start > end) return '開始日期不能晚於結束日期';
  if (end > today) return '結束日期不能超過今天';
  if (start < min) return '最多只能查最近 3 個月';
  return '';
}
async function runPeriodReport() {
  const start = document.getElementById('period-start')?.value;
  const end = document.getElementById('period-end')?.value;
  const result = document.getElementById('period-result');
  const err = validatePeriod(start, end);
  if (err) {
    result.innerHTML = `<div class="modal-spinner" style="padding:22px;color:#f87171">${err}</div>`;
    return;
  }
  result.innerHTML = '<div class="modal-spinner"><div class="mini-spinner"></div><div>查詢中…</div></div>';
  try {
    const orders = await getRangeOrders(start, end, 'completed,processing');
    const summary = summarizeOrders(orders);
    const avgOrder = orders.length ? Math.round(summary.total/orders.length) : 0;
    const dayHtml = groupOrdersByDay(orders).map(([day, list]) => {
      const s = summarizeOrders(list);
      return `<div class="day-detail">
        <div class="day-title"><span>${day}</span><span>${list.length} 筆｜$${s.total.toLocaleString()}</span></div>
        <div class="day-grid">
          <span>現金<strong>$${s.by.cash.total.toLocaleString()}</strong></span>
          <span>Line Pay<strong>$${s.by.line_pay.total.toLocaleString()}</strong></span>
          <span>台灣 Pay<strong>$${s.by.taiwan_pay.total.toLocaleString()}</strong></span>
        </div>
      </div>`;
    }).join('');
    result.innerHTML = `
      <div class="stats-row"><span class="sk">📅 查詢期間</span><span class="sv">${start} ～ ${end}</span></div>
      <div class="stats-row"><span class="sk">💰 總收款</span><span class="sv">$${summary.total.toLocaleString()}</span></div>
      <div class="stats-row"><span class="sk">🧾 訂單數</span><span class="sv">${orders.length} 筆</span></div>
      <div class="stats-row"><span class="sk">📦 銷售件數</span><span class="sv">${summary.items} 件</span></div>
      <div class="stats-row"><span class="sk">💵 現金</span><span class="sv">$${summary.by.cash.total.toLocaleString()}</span></div>
      <div class="stats-row"><span class="sk">🟢 Line Pay</span><span class="sv">$${summary.by.line_pay.total.toLocaleString()}</span></div>
      <div class="stats-row"><span class="sk">🟠 台灣 Pay</span><span class="sv">$${summary.by.taiwan_pay.total.toLocaleString()}</span></div>
      ${summary.by.other.count ? `<div class="stats-row"><span class="sk">❔ 其他付款</span><span class="sv">$${summary.by.other.total.toLocaleString()}</span></div>` : ''}
      <div class="stats-row"><span class="sk">📊 平均客單價</span><span class="sv">$${avgOrder.toLocaleString()}</span></div>
      ${orders.length ? `<div class="stats-row header"><span class="sk">每日收款</span><span class="sv">付款方式小計</span></div>${dayHtml}` : '<div class="modal-spinner" style="padding:20px">此期間沒有收款訂單</div>'}
      ${paymentDetailHtml('💵 現金每筆', summary.by.cash)}
      ${paymentDetailHtml('🟢 Line Pay 每筆', summary.by.line_pay)}
      ${paymentDetailHtml('🟠 台灣 Pay 每筆', summary.by.taiwan_pay)}
    `;
  } catch(e) {
    result.innerHTML = '<div class="modal-spinner">查詢失敗，請確認網路或稍後再試</div>';
  }
}

let _tt;
function toast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(_tt); _tt = setTimeout(()=>el.className='', 2500);
}
